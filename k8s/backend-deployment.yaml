apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: med-assistant
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: med-assistant-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: med-assistant-config
        volumeMounts:
        - name: chroma-db
          mountPath: /app/chroma_db
        - name: models-cache
          mountPath: /app/models_cache
        - name: data
          mountPath: /app/data
      volumes:
      - name: chroma-db
        persistentVolumeClaim:
          claimName: chroma-db-pvc
      - name: models-cache
        persistentVolumeClaim:
          claimName: models-cache-pvc
      - name: data
        emptyDir: {} # For temporary uploads; use PVC for persistence across pods if needed
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: med-assistant
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
