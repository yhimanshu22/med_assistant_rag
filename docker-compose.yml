version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: med_assistant_backend
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./models_cache:/app/models_cache
    environment:
      - DB_DIR=/app/chroma_db
      - DATA_DIR=/app/data
      - MODEL_CACHE_DIR=/app/models_cache
      - PYTHONUNBUFFERED=1
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: med_assistant_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
